baseURL = "https://osamusic.github.io/univ-news/"
languageCode = "ja"
title = "大学入試情報 日報"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false

[params]
  author = "osamusic"
  description = "東京近郊大学の入試情報を毎日自動収集してお届けします。"
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "大学入試情報 日報"
    Content = "東京近郊大学の入試・受験情報・教育政策を毎日自動収集してお届けします。"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[menu]
  [[menu.main]]
    name = "アーカイブ"
    url = "/archives/"
    weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]
